services:
  # Backend Web Service
  - type: web
    name: invisiovault-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # 1 worker + 2 threads: free tier has ~512 MB RAM; one sync worker avoids
    # OOM. Two threads within the worker handle overlapping I/O without blocking
    # the health check. --preload loads the app once before forking — faster
    # startup means Render's first health probe is answered before the timeout.
    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 120 --graceful-timeout 30 --bind 0.0.0.0:$PORT --preload --log-level info
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: UPLOAD_FOLDER
        value: uploads
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FILE
        value: app.log
      - key: CORS_ORIGINS
        sync: false
    # Health check configuration
    healthCheckPath: /api/health
    autoDeploy: true
