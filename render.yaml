services:
  # Backend Web Service
  - type: web
    name: invisiovault-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # All gunicorn options (workers, threads, timeout, preload, hooks) live in
    # backend/gunicorn.conf.py, which gunicorn auto-discovers from the rootDir.
    # Keeping options in one place prevents drift between Procfile, render.yaml,
    # and code.  The post_fork hook in gunicorn.conf.py starts the
    # FileCleanupScheduler safely inside each worker — not in the master process.
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: UPLOAD_FOLDER
        value: uploads
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FILE
        value: app.log
      - key: CORS_ORIGINS
        sync: false
    # Health check configuration
    healthCheckPath: /api/health
    autoDeploy: true
